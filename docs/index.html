<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINER PRO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #020617; color: #f1f5f9; font-family: sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const GITHUB_BASE = "https://raw.githubusercontent.com/Seyedalimoosavi369/-Minerbyner_bot/main";
const API = "https://web-production-aa8bad.up.railway.app";

const ITEMS = [
  { id: 1, name: "Basic Core", price: 1000, boost: 5, img: `${GITHUB_BASE}/f.png` },
  { id: 2, name: "Quantum Rig", price: 2000, boost: 12, img: `${GITHUB_BASE}/g.png` },
  { id: 3, name: "Nebula Core", price: 4000, boost: 25, img: `${GITHUB_BASE}/skek.png` },
  { id: 4, name: "Nano Miner", price: 8000, boost: 45, img: `${GITHUB_BASE}/wkjw.png` },
  { id: 5, name: "Ion Reactor", price: 16000, boost: 80, img: `${GITHUB_BASE}/sksk.png` },
  { id: 6, name: "Dark Plasma", price: 32000, boost: 150, img: `${GITHUB_BASE}/sks.png` },
  { id: 7, name: "Void Engine", price: 64000, boost: 300, img: `${GITHUB_BASE}/skks.png` },
  { id: 8, name: "Gravity Drill", price: 128000, boost: 600, img: `${GITHUB_BASE}/sjjss.png` },
  { id: 9, name: "Star Forge", price: 256000, boost: 1200, img: `${GITHUB_BASE}/sjjeuwjj.png` },
  { id: 10, name: "Cyber Node", price: 512000, boost: 2500, img: `${GITHUB_BASE}/siieei.png` },
  { id: 11, name: "Nova Matrix", price: 1000000, boost: 5000, img: `${GITHUB_BASE}/nzz.png` },
  { id: 12, name: "God Engine", price: 2000000, boost: 10000, img: `${GITHUB_BASE}/jsjs.png` }
];

const SPECIAL_ARTIFACTS = [
  { id: 'Z', items: [1,2,3], img: `${GITHUB_BASE}/Gemini_Generated_Image_3w0elk3w0elk3w0e.png` },
  { id: 'E', items: [4,5,6], img: `${GITHUB_BASE}/Gemini_Generated_Image_eie1yceie1yceie1.png` },
  { id: 'U', items: [7,8,9], img: `${GITHUB_BASE}/Gemini_Generated_Image_i7etji7etji7etji.png` },
  { id: 'S', items: [10,11,12], img: `${GITHUB_BASE}/Gemini_Generated_Image_ow1889ow1889ow18.png` }
];

function App() {
  const [activeTab, setActiveTab] = React.useState('Home');
  const [userData, setUserData] = React.useState({ balance: 0, ton_balance: 0, inventory: {}, hashrate: 0 });
  const [loading, setLoading] = React.useState(true);
  const [team, setTeam] = React.useState([]);

  const tg = window.Telegram?.WebApp;
  const initData = tg?.initData || "";
  const ref = new URLSearchParams(window.location.search).get('ref') || "";

  const apiCall = async (path, method = 'GET', body = null) => {
    const res = await fetch(`${API}${path}`, {
      method,
      headers: { 'Content-Type': 'application/json', 'X-Init-Data': initData },
      body: body ? JSON.stringify(body) : null
    });
    return res.json();
  };

  React.useEffect(() => {
    tg?.ready();
    tg?.expand();
    apiCall('/api/user', 'POST', { ref }).then(data => {
      if (!data.error) setUserData(data);
      setLoading(false);
    });
  }, []);

  React.useEffect(() => {
    const interval = setInterval(() => {
      if (userData.hashrate > 0) {
        setUserData(prev => ({ ...prev, balance: prev.balance + prev.hashrate / 10 }));
      }
    }, 1000);
    return () => clearInterval(interval);
  }, [userData.hashrate]);

  const handleClick = async () => {
    const data = await apiCall('/api/click', 'POST');
    if (!data.error) setUserData(prev => ({ ...prev, balance: data.balance }));
  };

  const handleBuy = async (item) => {
    const data = await apiCall('/api/buy', 'POST', { item_id: item.id });
    if (data.error) alert(data.error);
    else setUserData(prev => ({ ...prev, balance: data.balance, ton_balance: data.ton_balance, inventory: data.inventory }));
  };

  const handleConvert = async (direction) => {
    const data = await apiCall('/api/convert', 'POST', { direction });
    if (data.error) alert(data.error);
    else setUserData(prev => ({ ...prev, balance: data.balance, ton_balance: data.ton_balance }));
  };

  const handleWithdraw = async () => {
    const wallet = prompt("Enter your TON wallet address:");
    if (!wallet) return;
    const data = await apiCall('/api/withdraw', 'POST', { amount: 10, wallet });
    if (data.error) alert(data.error);
    else alert("Withdrawal request sent!");
  };

  const loadTeam = async () => {
    const data = await apiCall('/api/team');
    if (!data.error) setTeam(data.referrals);
  };

  if (loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',fontSize:24,color:'#22d3ee'}}>Loading...</div>;

  const inv = userData.inventory || {};

  return (
    <div style={{background:'#020617',color:'#f1f5f9',minHeight:'100vh',paddingBottom:80}}>
      <div style={{padding:'16px',borderBottom:'1px solid #1e293b',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontWeight:'bold',color:'#22d3ee',fontSize:18}}>MINER PRO</span>
        <div style={{textAlign:'right',fontSize:12}}>
          <div style={{color:'#facc15',fontWeight:'bold'}}>{Math.floor(userData.balance).toLocaleString()} TRX</div>
          <div style={{color:'#60a5fa',fontWeight:'bold'}}>{(userData.ton_balance||0).toFixed(2)} TON</div>
        </div>
      </div>

      <div style={{padding:16}}>
        {activeTab === 'Home' && (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',paddingTop:40}}>
            <button onClick={handleClick} style={{width:160,height:160,borderRadius:'50%',border:'4px solid #22d3ee',background:'#0f172a',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:60}}>
              ⚡
            </button>
            <p style={{marginTop:16,color:'#94a3b8'}}>Hashrate: {userData.hashrate || 0}/s</p>
            <p style={{color:'#94a3b8',fontSize:12,marginTop:8}}>Tap to mine!</p>
          </div>
        )}

        {activeTab === 'Shop' && (
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {ITEMS.map(item => {
              const level = inv[String(item.id)] || 0;
              const isTon = level >= 10;
              const cost = isTon ? 1 : Math.floor(item.price * Math.pow(1.5, level));
              return (
                <div key={item.id} style={{background:'#0f172a',padding:12,borderRadius:12,display:'flex',alignItems:'center',gap:12,border:'1px solid #1e293b'}}>
                  <img src={item.img} style={{width:48,height:48,borderRadius:8}} onError={e=>e.target.style.display='none'} />
                  <div style={{flex:1,fontSize:12}}>
                    <div style={{fontWeight:'bold'}}>{item.name} (Lv {level})</div>
                    <div style={{color: isTon ? '#60a5fa' : '#eab308'}}>{cost} {isTon ? 'TON' : 'TRX'}</div>
                  </div>
                  <button onClick={() => handleBuy(item)} style={{background:'#0e7490',padding:'6px 12px',borderRadius:8,border:'none',color:'white',fontSize:10,fontWeight:'bold',cursor:'pointer'}}>UPGRADE</button>
                </div>
              );
            })}
          </div>
        )}

        {activeTab === 'Network' && (
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <button onClick={loadTeam} style={{background:'#1e293b',padding:12,borderRadius:8,border:'none',color:'white',cursor:'pointer'}}>Load Team</button>
            {team.map(r => (
              <div key={r.user_id} style={{background:'#0f172a',padding:12,borderRadius:8,border:'1px solid #1e293b',fontSize:12}}>
                <div style={{fontWeight:'bold'}}>{r.first_name} {r.username ? `@${r.username}` : ''}</div>
                <div style={{color:'#facc15'}}>{Math.floor(r.balance).toLocaleString()} TRX</div>
              </div>
            ))}
            {team.length === 0 && <p style={{color:'#94a3b8',textAlign:'center'}}>No referrals yet</p>}
          </div>
        )}

        {activeTab === 'Profile' && (
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <h2 style={{textAlign:'center',fontWeight:'bold'}}>ARTIFACTS</h2>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
              {SPECIAL_ARTIFACTS.map(art => {
                const unlocked = art.items.every(id => (inv[String(id)] || 0) > 0);
                return (
                  <div key={art.id} style={{padding:12,borderRadius:12,border:`1px solid ${unlocked?'#6366f1':'#1e293b'}`,background:unlocked?'#1e1b4b':'#0f172a',opacity:unlocked?1:0.5}}>
                    <img src={art.img} style={{width:'100%',height:80,objectFit:'cover',borderRadius:8,marginBottom:8}} onError={e=>e.target.style.display='none'} />
                    <p style={{textAlign:'center',fontSize:10,fontWeight:'bold'}}>{unlocked?'ACTIVE':'LOCKED'}</p>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {activeTab === 'Wallet' && (
          <div style={{background:'#0f172a',padding:16,borderRadius:16,border:'1px solid #1e293b',textAlign:'center',display:'flex',flexDirection:'column',gap:16}}>
            <h2 style={{color:'#60a5fa',fontWeight:'bold'}}>TON Wallet</h2>
            <div>Balance: {(userData.ton_balance||0).toFixed(2)} TON</div>
            <div style={{display:'flex',justifyContent:'center',gap:8}}>
              <button onClick={() => handleConvert('trx_to_ton')} style={{background:'#15803d',padding:'8px 16px',borderRadius:8,border:'none',color:'white',fontSize:12,fontWeight:'bold',cursor:'pointer'}}>TRX → TON</button>
              <button onClick={() => handleConvert('ton_to_trx')} style={{background:'#b91c1c',padding:'8px 16px',borderRadius:8,border:'none',color:'white',fontSize:12,fontWeight:'bold',cursor:'pointer'}}>TON → TRX</button>
            </div>
            <button onClick={() => window.open(`ton://transfer/UQCs20TzgI5bmr5TJo3PigiEn0DMJhWktPOw7bo27K2FVZwI`, '_blank')} style={{width:'100%',background:'#1d4ed8',padding:12,borderRadius:8,border:'none',color:'white',fontSize:12,fontWeight:'bold',cursor:'pointer'}}>DEPOSIT TON</button>
            <button onClick={handleWithdraw} style={{width:'100%',background:'#334155',padding:12,borderRadius:8,border:'none',color:'white',fontSize:12,fontWeight:'bold',cursor:'pointer'}}>WITHDRAW (MIN 10 TON)</button>
          </div>
        )}
      </div>

      <nav style={{position:'fixed',bottom:0,width:'100%',background:'#020617',borderTop:'1px solid #1e293b',display:'flex',justifyContent:'space-around',padding:16}}>
        {[['Home','🏠'],['Network','🌐'],['Shop','🛒'],['Wallet','💳'],['Profile','👤']].map(([tab,icon]) => (
          <button key={tab} onClick={() => { setActiveTab(tab); if(tab==='Network') loadTeam(); }} style={{background:'none',border:'none',color: activeTab===tab ? '#22d3ee' : '#64748b',fontSize:24,cursor:'pointer'}}>
            {icon}
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
